<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <title>Shanti Care Home — Management Portal</title>
    <meta name="theme-color" content="#1a3a5c" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Clinical Intelligence Platform — 6 deterministic safety engines, 192 validated test cases" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ShantiCare" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="version" content="2.0.0-20260331" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Theme init: runs synchronously before CSS applies, so there is no
         flash of the wrong theme. Defaults to LIGHT; dark only when the user
         has explicitly toggled it. -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('ch_theme') || 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <!-- React + Google Translate safety patch.
         Google Translate mutates text nodes; when React later tries to
         removeChild/insertBefore on a node whose parent has changed, the
         browser throws "Cannot execute 'removeChild' ... not a child of this
         node". This shim makes those DOM ops idempotent so the app
         doesn't white-screen on language switch.
         Credit: facebook/react#11538 community workaround. -->
    <script>
      (function(){
        if (typeof Node !== 'function' || !Node.prototype) return;
        var origRemove = Node.prototype.removeChild;
        Node.prototype.removeChild = function(child) {
          if (child.parentNode !== this) {
            if (console && console.warn) console.warn('[i18n-safe] skipped removeChild: not a child');
            return child;
          }
          return origRemove.apply(this, arguments);
        };
        var origInsert = Node.prototype.insertBefore;
        Node.prototype.insertBefore = function(newNode, refNode) {
          if (refNode && refNode.parentNode !== this) {
            if (console && console.warn) console.warn('[i18n-safe] skipped insertBefore: ref not a child');
            return newNode;
          }
          return origInsert.apply(this, arguments);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Google Translate: hidden, controlled by our custom UI -->
    <div id="google_translate_element" style="display:none"></div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'hi,ta,te,kn,mr,gu,bn,or,pa,ml,de,fr,nl,es,pt,it,pl,ro,el,sv,da,no,fi,uk,cs,hu,ar,fa,tr,he,ur,zh-CN,zh-TW,ja,ko,th,vi,id,ms,fil,my,sw,am,ha,yo,zu,af,ht,mi,sm',
          autoDisplay: false,
        }, 'google_translate_element');
      }

      // Called by our React component to trigger translation
      window.triggerGoogleTranslate = function(langCode) {
        var combo = document.querySelector('.goog-te-combo');
        if (combo) {
          combo.value = langCode;
          combo.dispatchEvent(new Event('change'));
          return true;
        }
        // Fallback: set cookie and reload
        document.cookie = 'googtrans=/en/' + langCode + ';path=/';
        document.cookie = 'googtrans=/en/' + langCode + ';path=/;domain=' + location.hostname;
        location.reload();
        return false;
      };

      window.resetGoogleTranslate = function() {
        // Remove translation
        document.cookie = 'googtrans=;path=/;expires=Thu, 01 Jan 1970 00:00:00 GMT';
        document.cookie = 'googtrans=;path=/;domain=' + location.hostname + ';expires=Thu, 01 Jan 1970 00:00:00 GMT';
        var frame = document.querySelector('.goog-te-banner-frame');
        if (frame) {
          var btn = frame.contentDocument.querySelector('.goog-close-link');
          if (btn) btn.click();
        }
        location.reload();
      };
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
      .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
      #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
      .VIpgJd-ZVi9od-ORHb-OEVmcd { display: none !important; }
      .skiptranslate iframe { display: none !important; }
    </style>
  </body>
</html>
